name: Android Harvester CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - name: Build
        run: |
          mkdir t && cd t && touch settings.gradle && gradle wrapper --gradle-version 8.4
          cd .. && rm -rf gradle gradlew gradlew.bat && mv t/gradle . && mv t/gradlew . && mv t/gradlew.bat .
          chmod +x gradlew && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with: { name: Harvester-APK, path: app/build/outputs/apk/debug/app-debug.apk }